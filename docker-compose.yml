services:
  api:
    build:
      context: ./apps/api
    image: board-game-companion-api
    container_name: board-game-companion-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      PORT: 3001
      DATABASE_PATH: /data/app.db
      # Comma-separated allowlist; set to your Vercel URL in production.
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - api-data:/data

volumes:
  api-data:
